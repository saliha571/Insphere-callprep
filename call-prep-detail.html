<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Brief — Insphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════════════════════
       LAYER 1 — PRIMITIVE TOKENS
    ══════════════════════════════════════════════════════════ */
    :root {
      --spacing-0:    0px;    --spacing-0-5: 0.125rem; --spacing-1:   0.25rem;
      --spacing-1-5:  0.375rem; --spacing-2: 0.5rem;   --spacing-2-5: 0.625rem;
      --spacing-3:    0.75rem;  --spacing-3-5:0.875rem; --spacing-4:  1rem;
      --spacing-5:    1.25rem;  --spacing-6:  1.5rem;  --spacing-7:   1.75rem;
      --spacing-8:    2rem;     --spacing-9:  2.25rem; --spacing-10:  2.5rem;
      --spacing-12:   3rem;     --spacing-16: 4rem;

      --text-2xs: 0.625rem; --text-xs: 0.75rem; --text-sm: 0.875rem;
      --text-base: 1rem;    --text-lg: 1.125rem; --text-xl: 1.25rem;
      --text-2xl: 1.5rem;   --text-3xl: 1.875rem;

      --font-light: 300; --font-normal: 400; --font-medium: 500;
      --font-semibold: 600; --font-bold: 700;

      --leading-none: 1; --leading-tight: 1.25; --leading-normal: 1.5;
      --leading-relaxed: 1.625;
      --tracking-tight: -0.025em; --tracking-wide: 0.025em;
      --tracking-wider: 0.05em;  --tracking-widest: 0.1em;

      --radius-none: 0px; --radius-sm: 0.25rem; --radius-md: 0.375rem;
      --radius-lg: 0.5rem; --radius-xl: 0.75rem; --radius-2xl: 1rem;
      --radius-full: 9999px;

      --shadow-none: none;
      --shadow-xs:   0 1px 2px 0 #1018280d;
      --shadow-sm:   0 1px 2px 0 #0000000d;
      --shadow-md:   0 2px 4px -1px #0000000f, 0 0 15px 2px #0000001a;
    }

    /* ══════════════════════════════════════════════════════════
       LAYER 2 — SEMANTIC TOKENS
    ══════════════════════════════════════════════════════════ */
    :root {
      --background:          #faf9f4;
      --foreground:          #020617;
      --card:                #ffffff;
      --card-foreground:     #020617;
      --primary:             #2563eb;
      --primary-foreground:  #f8fafc;
      --secondary:           #f1f5f9;
      --secondary-foreground:#0f172a;
      --muted:               #f1f5f9;
      --muted-foreground:    #64748b;
      --accent:              #f1f5f9;
      --accent-foreground:   #0f172a;
      --success:             #16a34a;
      --success-foreground:  #ffffff;
      --warning:             #d97706;
      --destructive:         #dc2626;
      --border:              #e2e8f0;
      --input:               #e2e8f0;
      --ring:                #6366f1;
      --radius:              0.5rem;
      --chart-1:             #f97316;
      --chart-1-bg:          #fff7ed;
      --chart-1-border:      #fed7aa;
      --sidebar:             #ffffff;
      --sidebar-foreground:  #020617;
      --sidebar-primary:     #0f172a;
      --sidebar-accent:      #f1f5f9;
      --sidebar-accent-foreground: #0f172a;
      --sidebar-border:      #e2e8f0;
      --sidebar-muted-fg:    #64748b;
      --font-family: "SF Pro Display","SF Pro Text",Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
    }

    /* ══════════════════════════════════════════════════════════
       LAYER 3 — COMPONENT TOKENS
    ══════════════════════════════════════════════════════════ */
    :root {
      --btn-bg:          var(--primary);
      --btn-fg:          var(--primary-foreground);
      --btn-radius:      var(--radius);
      --btn-px:          var(--spacing-4);
      --btn-py:          var(--spacing-2);
      --btn-font-size:   var(--text-sm);
      --btn-font-weight: var(--font-medium);
      --btn-shadow:      var(--shadow-xs);
      --btn-outline-bg:  var(--card);
      --btn-outline-fg:  var(--foreground);
      --btn-outline-border: var(--border);

      --card-radius:  calc(var(--radius) + 2px);
      --card-shadow:  var(--shadow-sm);
      --card-border:  var(--border);

      --sidebar-item-h:      var(--spacing-8);
      --sidebar-item-px:     var(--spacing-3);
      --sidebar-item-radius: calc(var(--radius) - 2px);
      --sidebar-item-size:   var(--text-sm);
      --sidebar-item-weight: var(--font-medium);
      --sidebar-item-gap:    var(--spacing-2);
    }

    /* ══════════════════════════════════════════════════════════
       BASE
    ══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-family);
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      background: var(--background);
      color: var(--foreground);
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }
    input, textarea { font-family: inherit; border: none; outline: none; background: transparent; }
    .focus-ring:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }

    /* ══════════════════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════════════════ */
    .app-shell { display: flex; height: 100vh; width: 100vw; overflow: hidden; background: var(--card); }

    /* ══════════════════════════════════════════════════════════
       SIDEBAR (identical token usage to dashboard)
    ══════════════════════════════════════════════════════════ */
    .sidebar {
      flex-shrink: 0; width: 180px; height: 100%;
      display: flex; flex-direction: column; justify-content: space-between;
      background: var(--sidebar); color: var(--sidebar-foreground);
    }
    .sidebar-top { display: flex; flex-direction: column; }
    .sidebar-icon-section { display: flex; flex-direction: column; gap: var(--spacing-0-5); padding: var(--spacing-3) var(--spacing-3) var(--spacing-2); }
    .back-btn {
      display: flex; align-items: center; justify-content: center;
      width: var(--spacing-8); height: var(--spacing-8);
      border-radius: var(--radius-full); border: 0.5px solid var(--border);
      color: var(--muted-foreground); margin-bottom: var(--spacing-2); transition: background 0.15s;
    }
    .back-btn:hover { background: var(--sidebar-accent); }
    .back-btn svg { width: 14px; height: 14px; }
    .sidebar-nav-item {
      display: flex; align-items: center; gap: var(--sidebar-item-gap);
      height: var(--sidebar-item-h); padding: 0 var(--sidebar-item-px);
      border-radius: var(--sidebar-item-radius);
      font-size: var(--sidebar-item-size); font-weight: var(--sidebar-item-weight);
      color: var(--sidebar-foreground); transition: background 0.12s;
    }
    .sidebar-nav-item:hover { background: var(--sidebar-accent); }
    .sidebar-nav-item svg { width: 18px; height: 18px; flex-shrink: 0; color: var(--muted-foreground); }
    .sidebar-divider { padding: var(--spacing-1) var(--spacing-3); }
    .sidebar-divider-line { height: 1px; background: var(--sidebar-border); }
    .sidebar-group { padding: var(--spacing-2); display: flex; flex-direction: column; gap: var(--spacing-1); }
    .sidebar-group-label {
      font-size: var(--text-xs); font-weight: var(--font-medium); color: var(--sidebar-muted-fg);
      padding: 0 var(--spacing-3); height: var(--sidebar-item-h);
      display: flex; align-items: center;
      letter-spacing: var(--tracking-wider); text-transform: uppercase;
    }
    .sidebar-text-item { position: relative; display: flex; align-items: center; }
    .active-bar {
      position: absolute; left: calc(-1 * var(--spacing-2));
      width: 3px; height: var(--spacing-5);
      border-radius: var(--radius-full); background: var(--sidebar-primary);
    }
    .sidebar-text-item-btn {
      display: flex; align-items: center; width: 100%;
      height: var(--sidebar-item-h); padding: 0 var(--sidebar-item-px);
      border-radius: var(--sidebar-item-radius);
      font-size: var(--sidebar-item-size); font-weight: var(--sidebar-item-weight);
      color: var(--sidebar-foreground); transition: background 0.12s;
    }
    .sidebar-text-item-btn:hover { background: var(--sidebar-accent); }
    .sidebar-text-item-btn.active { background: var(--sidebar-accent); }
    .sidebar-footer { display: flex; flex-direction: column; gap: var(--spacing-1-5); }
    .chrome-card { margin: 0 var(--spacing-2-5); background: #eff6ff; border-radius: var(--radius); padding: var(--spacing-3); }
    .chrome-inner { display: flex; align-items: center; gap: var(--spacing-2-5); }
    .chrome-avatar { width: var(--spacing-8); height: var(--spacing-8); border-radius: var(--radius-md); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: var(--text-base); }
    .chrome-text { flex: 1; min-width: 0; }
    .chrome-row { display: flex; align-items: center; justify-content: space-between; }
    .chrome-title { font-size: var(--text-xs); font-weight: var(--font-semibold); color: #19173d; }
    .chrome-sub { font-size: var(--text-2xs); color: var(--muted-foreground); margin-top: var(--spacing-0-5); }
    .user-footer { padding: var(--spacing-2) var(--spacing-2-5) var(--spacing-3); }
    .user-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: var(--spacing-1-5) var(--spacing-2); border-radius: var(--sidebar-item-radius); transition: background 0.12s; }
    .user-btn:hover { background: var(--sidebar-accent); }
    .user-left { display: flex; align-items: center; gap: var(--spacing-2-5); }
    .user-avatar { width: var(--spacing-8); height: var(--spacing-8); border-radius: var(--radius-md); background: var(--primary); color: var(--primary-foreground); font-size: var(--text-sm); font-weight: var(--font-semibold); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .user-info { display: flex; flex-direction: column; }
    .user-name  { font-size: var(--text-sm); font-weight: var(--font-medium); color: var(--sidebar-foreground); line-height: var(--leading-tight); }
    .user-email { font-size: var(--text-2xs); color: var(--muted-foreground); }
    .chevron svg { width: 16px; height: 16px; color: var(--muted-foreground); }

    /* ══════════════════════════════════════════════════════════
       MAIN CONTENT — DETAIL VIEW
    ══════════════════════════════════════════════════════════ */
    .main-content {
      flex: 1; margin: var(--spacing-2) var(--spacing-2) var(--spacing-2) 0;
      display: flex; flex-direction: column;
      border-radius: var(--radius); border: 1px solid var(--border);
      background: #eef2fb; box-shadow: var(--shadow-sm); overflow: hidden;
    }

    /* ── HEADER ──────────────────────────────────────────── */
    .content-header {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: var(--spacing-2-5) var(--spacing-5); border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
    }
    .header-left { display: flex; align-items: center; gap: var(--spacing-3); }
    .back-to-list {
      display: flex; align-items: center; gap: var(--spacing-1-5);
      font-size: var(--text-sm); font-weight: var(--font-medium);
      color: var(--muted-foreground); transition: color 0.12s;
      text-decoration: none;
    }
    .back-to-list:hover { color: var(--foreground); }
    .back-to-list svg { width: 16px; height: 16px; }
    .header-sep { width: 1px; height: 20px; background: var(--border); }
    .call-meta { display: flex; align-items: center; gap: var(--spacing-2); }
    .call-name { font-size: var(--text-base); font-weight: var(--font-semibold); color: var(--foreground); }
    .call-sub  { font-size: var(--text-sm); color: var(--muted-foreground); }
    .dot-sep   { width: 4px; height: 4px; border-radius: var(--radius-full); background: var(--muted-foreground); }
    .badge-sm {
      display: inline-flex; align-items: center; gap: var(--spacing-1);
      padding: 2px var(--spacing-2);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: var(--font-semibold);
      white-space: nowrap; border: 1px solid transparent;
    }
    .badge-disco-sm { color: var(--primary); background: #eff6ff; border-color: #bfdbfe; }
    .badge-predc-sm { color: var(--chart-1); background: var(--chart-1-bg); border-color: var(--chart-1-border); }
    .badge-dot-sm   { width: 5px; height: 5px; border-radius: var(--radius-full); background: currentColor; }

    .header-right { display: flex; align-items: center; gap: var(--spacing-2); }
    .icon-btn { display: flex; align-items: center; justify-content: center; width: var(--spacing-8); height: var(--spacing-8); border-radius: var(--radius); color: var(--muted-foreground); transition: background 0.12s; }
    .icon-btn:hover { background: rgba(255,255,255,0.7); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ── PROGRESS BAR ─────────────────────────────────── */
    .progress-strip {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: var(--spacing-2-5); padding: var(--spacing-3) var(--spacing-5);
      background: rgba(255,255,255,0.4); border-bottom: 1px solid var(--border);
    }
    .progress-item {
      display: flex; align-items: center; gap: var(--spacing-2); cursor: pointer;
    }
    .progress-dot {
      width: 28px; height: 28px;
      border-radius: var(--radius-full);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--text-xs); font-weight: var(--font-semibold);
      border: 1.5px solid var(--border);
      background: var(--card); color: var(--muted-foreground);
      transition: all 0.2s;
    }
    .progress-dot.done    { background: var(--success); border-color: var(--success); color: var(--success-foreground); }
    .progress-dot.current { background: var(--primary); border-color: var(--primary); color: var(--primary-foreground); }
    .progress-dot.done svg, .progress-dot.current svg { display: none; }
    .progress-label {
      font-size: var(--text-xs); font-weight: var(--font-medium);
      color: var(--muted-foreground); white-space: nowrap;
      transition: color 0.2s;
    }
    .progress-label.current { color: var(--primary); }
    .progress-label.done    { color: var(--success); }
    .progress-connector { width: 28px; height: 1px; background: var(--border); }
    .progress-connector.done { background: var(--success); }

    /* ── CHAT AREA ────────────────────────────────────── */
    .chat-area {
      flex: 1; overflow-y: auto; padding: var(--spacing-6) var(--spacing-5) var(--spacing-4);
      display: flex; flex-direction: column; gap: var(--spacing-5);
      scroll-behavior: smooth;
    }

    /* Agent message bubble — card tokens */
    .agent-turn {
      display: flex; flex-direction: column; gap: var(--spacing-3);
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      max-width: 720px;
    }
    .agent-turn.visible { opacity: 1; transform: translateY(0); }

    .turn-header {
      display: flex; align-items: center; gap: var(--spacing-2);
    }
    .agent-avatar {
      width: var(--spacing-8); height: var(--spacing-8);
      border-radius: var(--radius-full);
      background: var(--primary); color: var(--primary-foreground);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .agent-avatar svg { width: 16px; height: 16px; }
    .turn-meta { display: flex; flex-direction: column; }
    .turn-agent-name { font-size: var(--text-sm); font-weight: var(--font-semibold); color: var(--foreground); }
    .turn-label {
      font-size: var(--text-2xs); font-weight: var(--font-semibold);
      letter-spacing: var(--tracking-widest); text-transform: uppercase;
      color: var(--muted-foreground);
    }

    /* Bubble — card shadow + radius */
    .bubble {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--card-radius); box-shadow: var(--card-shadow);
      padding: var(--spacing-4) var(--spacing-5);
      font-size: var(--text-sm); line-height: var(--leading-relaxed);
      color: var(--card-foreground); position: relative;
    }

    /* Typing cursor animation */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .typing-cursor::after {
      content: '▋';
      display: inline-block;
      color: var(--primary);
      animation: blink 0.9s infinite;
      margin-left: 2px;
      font-size: 0.75em;
    }

    /* Action row below each turn */
    .turn-actions {
      display: flex; align-items: center; gap: var(--spacing-2-5);
      opacity: 0; transform: translateY(4px);
      transition: opacity 0.25s ease 0.2s, transform 0.25s ease 0.2s;
    }
    .turn-actions.visible { opacity: 1; transform: translateY(0); }

    /* Keep going — primary button tokens */
    .btn-keep-going {
      display: flex; align-items: center; gap: var(--spacing-1-5);
      padding: var(--btn-py) var(--btn-px);
      border-radius: var(--btn-radius);
      background: var(--btn-bg); color: var(--btn-fg);
      font-size: var(--btn-font-size); font-weight: var(--btn-font-weight);
      box-shadow: var(--btn-shadow); transition: opacity 0.15s;
    }
    .btn-keep-going:hover { opacity: 0.88; }
    .btn-keep-going svg { width: 14px; height: 14px; }

    /* Ask a question — outline button tokens */
    .btn-ask {
      display: flex; align-items: center; gap: var(--spacing-1-5);
      padding: var(--btn-py) var(--btn-px);
      border-radius: var(--btn-radius);
      background: var(--btn-outline-bg); color: var(--btn-outline-fg);
      border: 1px solid var(--btn-outline-border);
      font-size: var(--btn-font-size); font-weight: var(--btn-font-weight);
      box-shadow: var(--shadow-xs); transition: background 0.12s;
    }
    .btn-ask:hover { background: var(--accent); }
    .btn-ask svg { width: 14px; height: 14px; }

    /* User message bubble */
    .user-turn {
      display: flex; justify-content: flex-end;
      opacity: 0; transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .user-turn.visible { opacity: 1; transform: translateY(0); }
    .user-bubble {
      background: var(--primary); color: var(--primary-foreground);
      border-radius: var(--card-radius);
      padding: var(--spacing-3) var(--spacing-4);
      font-size: var(--text-sm); line-height: var(--leading-relaxed);
      max-width: 520px; box-shadow: var(--shadow-xs);
    }

    /* Completion state */
    .briefing-complete {
      display: flex; flex-direction: column; align-items: center;
      gap: var(--spacing-2); padding: var(--spacing-4) var(--spacing-5);
      background: var(--success); border-radius: var(--radius);
      margin: 0 auto; max-width: 480px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .briefing-complete.visible { opacity: 1; transform: translateY(0); }
    .briefing-complete-text {
      font-size: var(--text-sm); font-weight: var(--font-medium);
      color: var(--success-foreground); text-align: center;
    }

    /* ── INPUT BAR ─────────────────────────────────────── */
    .input-area {
      flex-shrink: 0; padding: var(--spacing-3) var(--spacing-5) var(--spacing-4);
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.4); backdrop-filter: blur(8px);
    }
    .input-bar {
      display: flex; align-items: center; gap: var(--spacing-2);
      background: linear-gradient(175deg, rgba(255,255,255,0.9) 13%, rgba(255,255,255,0.4) 76%);
      border: 1px solid #e3edff;
      border-radius: var(--radius-full);
      padding: var(--spacing-2) var(--spacing-2) var(--spacing-2) var(--spacing-4);
      backdrop-filter: blur(16px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .input-bar:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1), 0 2px 8px rgba(0,0,0,0.04);
    }
    .input-field {
      flex: 1; font-size: var(--text-sm); color: var(--foreground);
      background: transparent; resize: none; overflow: hidden;
      line-height: var(--leading-normal);
    }
    .input-field::placeholder { color: var(--muted-foreground); }
    .input-hint {
      font-size: var(--text-xs); color: var(--muted-foreground);
      padding: 0 var(--spacing-2); white-space: nowrap;
    }
    .input-send {
      display: flex; align-items: center; justify-content: center;
      width: var(--spacing-8); height: var(--spacing-8);
      border-radius: var(--radius-full);
      background: var(--foreground); color: var(--card);
      flex-shrink: 0; transition: background 0.12s;
    }
    .input-send:hover { background: var(--primary); }
    .input-send svg { width: 16px; height: 16px; }
    .input-send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* disabled state until briefing complete or ask tapped */
    .input-area.locked .input-field { color: var(--muted-foreground); }
    .input-area.locked .input-bar {
      border-color: var(--border);
      background: rgba(241,245,249,0.7);
    }
  </style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-icon-section">
        <a href="call-prep.html" class="back-btn focus-ring">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        </a>

/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let currentTurn = 0;
let briefingComplete = false;
let callData = null;
let isTyping = false;

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
function init() {
  const params = new URLSearchParams(window.location.search);
  const callId = params.get('call') || 'andy';
  callData = CALLS[callId] || CALLS.andy;

  renderHeader();
  renderProgress();
  setTimeout(() => deliverTurn(0), 700);
}

/* ════════════════════════════════════════════════════════════
   HEADER
════════════════════════════════════════════════════════════ */
function renderHeader() {
  const meta = document.getElementById('call-meta');
  meta.innerHTML = `
    <span class="call-name">${callData.name}</span>
    <div class="dot-sep"></div>
    <span class="call-sub">${callData.company} · ${callData.role}</span>
    <div class="dot-sep"></div>
    <span class="badge-sm ${callData.badgeClass}"><span class="badge-dot-sm"></span>${callData.type}</span>
    <div class="dot-sep"></div>
    <span class="call-sub">${callData.time}</span>
  `;
}

/* ════════════════════════════════════════════════════════════
   PROGRESS STRIP
════════════════════════════════════════════════════════════ */
function renderProgress() {
  const strip = document.getElementById('progress-strip');
  strip.innerHTML = '';
  callData.turns.forEach((turn, i) => {
    // Connector
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'progress-connector';
      conn.id = `connector-${i}`;
      strip.appendChild(conn);
    }
    // Item
    const item = document.createElement('div');
    item.className = 'progress-item';
    item.onclick = () => { if (i < currentTurn) scrollToTurn(i); };
    item.innerHTML = `
      <div class="progress-dot" id="pdot-${i}">${i + 1}</div>
      <span class="progress-label" id="plabel-${i}">${turn.label}</span>
    `;
    strip.appendChild(item);
  });
  updateProgress();
}

function updateProgress() {
  callData.turns.forEach((_, i) => {
    const dot   = document.getElementById(`pdot-${i}`);
    const label = document.getElementById(`plabel-${i}`);
    const conn  = document.getElementById(`connector-${i}`);
    dot.className   = 'progress-dot' + (i < currentTurn ? ' done' : i === currentTurn ? ' current' : '');
    label.className = 'progress-label' + (i < currentTurn ? ' done' : i === currentTurn ? ' current' : '');
    if (conn) conn.className = 'progress-connector' + (i <= currentTurn ? ' done' : '');
    // checkmark for done
    if (i < currentTurn) {
      dot.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px"><polyline points="20 6 9 17 4 12"/></svg>`;
    } else {
      dot.textContent = i + 1;
    }
  });
}

function scrollToTurn(i) {
  const el = document.getElementById(`turn-${i}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ════════════════════════════════════════════════════════════
   DELIVER TURN
════════════════════════════════════════════════════════════ */
function deliverTurn(index) {
  if (isTyping || index >= callData.turns.length) return;
  isTyping = true;

  const turn = callData.turns[index];
  const chat = document.getElementById('chat-area');

  // Create turn wrapper
  const wrapper = document.createElement('div');
  wrapper.id = `turn-${index}`;
  wrapper.className = 'agent-turn';
  wrapper.innerHTML = `
    <div class="turn-header">
      <div class="agent-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </div>
      <div class="turn-meta">
        <span class="turn-agent-name">Insphere Agent</span>
        <span class="turn-label">Turn ${index + 1} — ${turn.label}</span>
      </div>
    </div>
    <div class="bubble typing-cursor" id="bubble-${index}"></div>
    <div class="turn-actions" id="actions-${index}"></div>
  `;
  chat.appendChild(wrapper);

  // Animate in
  requestAnimationFrame(() => {
    wrapper.classList.add('visible');
    chat.scrollTop = chat.scrollHeight;
  });

  // Type text character by character
  typeText(document.getElementById(`bubble-${index}`), turn.text, () => {
    isTyping = false;
    currentTurn = index + 1;
    updateProgress();
    showActions(index);
  });
}

function typeText(el, text, onDone) {
  el.textContent = '';
  const words = text.split(' ');
  let i = 0;
  const interval = setInterval(() => {
    if (i < words.length) {
      el.textContent += (i > 0 ? ' ' : '') + words[i];
      i++;
      document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
    } else {
      clearInterval(interval);
      el.classList.remove('typing-cursor');
      if (onDone) onDone();
    }
  }, 28);
}

/* ════════════════════════════════════════════════════════════
   ACTIONS AFTER EACH TURN
════════════════════════════════════════════════════════════ */
function showActions(index) {
  const actionsEl = document.getElementById(`actions-${index}`);
  const isLast = index === callData.turns.length - 1;

  if (isLast) {
    // Show completion state + unlock input
    actionsEl.innerHTML = `
      <div class="briefing-complete" id="briefing-complete">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><polyline points="20 6 9 17 4 12"/></svg>
        <span class="briefing-complete-text">Briefing complete. Ask me anything about this call.</span>
      </div>
    `;
    requestAnimationFrame(() => {
      actionsEl.classList.add('visible');
      document.getElementById('briefing-complete').classList.add('visible');
    });
    briefingComplete = true;
    unlockInput();
  } else {
    actionsEl.innerHTML = `
      <button class="btn-keep-going focus-ring" onclick="keepGoing(${index})">
        Keep going
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <button class="btn-ask focus-ring" onclick="focusInput()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Ask a question
      </button>
    `;
    requestAnimationFrame(() => actionsEl.classList.add('visible'));
  }

  document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
}

function keepGoing(index) {
  // Disable the actions for this turn
  const actionsEl = document.getElementById(`actions-${index}`);
  actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);
  actionsEl.style.opacity = '0.4';
  // Deliver next
  setTimeout(() => deliverTurn(index + 1), 300);
}

function focusInput() {
  // Temporarily unlock input for a question mid-briefing
  unlockInput(true);
  document.getElementById('chat-input').focus();
}

/* ════════════════════════════════════════════════════════════
   INPUT
════════════════════════════════════════════════════════════ */
function unlockInput(temporary = false) {
  const area = document.getElementById('input-area');
  const input = document.getElementById('chat-input');
  const send  = document.getElementById('send-btn');
  const hint  = document.getElementById('input-hint');
  area.classList.remove('locked');
  input.disabled = false;
  send.disabled  = false;
  if (temporary) {
    hint.textContent = 'Ask a question — I will continue after';
  } else {
    hint.textContent = 'Briefing complete';
    hint.style.display = 'none';
  }
  input.focus();
}

function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Add user bubble
  addUserBubble(text);

  // Find response
  setTimeout(() => {
    const lc = text.toLowerCase();
    let response = null;
    for (const qa of QA) {
      if (qa.keywords.some(k => lc.includes(k))) { response = qa.response; break; }
    }
    if (!response) {
      response = `That is a good question. Based on what I know about ${callData.name} and ${callData.company}, the most important thing here is to stay in discovery mode. Let ${callData.name} describe the situation in their own terms before you draw conclusions. Is there something specific about the call you want me to help you think through?`;
    }
    addAgentReply(response);

    // If mid-briefing, offer to continue
    if (!briefingComplete) {
      setTimeout(() => {
        const chat = document.getElementById('chat-area');
        const prompt = document.createElement('div');
        prompt.className = 'turn-actions visible';
        prompt.style.marginTop = 'var(--spacing-2)';
        prompt.innerHTML = `
          <button class="btn-keep-going focus-ring" onclick="this.closest('.turn-actions').remove(); deliverTurn(${currentTurn}); lockInput();">
            Continue briefing
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <button class="btn-ask focus-ring" onclick="">Ask another</button>
        `;
        chat.appendChild(prompt);
        chat.scrollTop = chat.scrollHeight;
      }, 600);
    }
  }, 500);
}

function lockInput() {
  if (briefingComplete) return;
  const area  = document.getElementById('input-area');
  const input = document.getElementById('chat-input');
  const send  = document.getElementById('send-btn');
  const hint  = document.getElementById('input-hint');
  area.classList.add('locked');
  input.disabled = true;
  send.disabled  = true;
  hint.textContent = 'Briefing in progress';
  hint.style.display = '';
}

function addUserBubble(text) {
  const chat = document.getElementById('chat-area');
  const el = document.createElement('div');
  el.className = 'user-turn';
  el.innerHTML = `<div class="user-bubble">${escHtml(text)}</div>`;
  chat.appendChild(el);
  requestAnimationFrame(() => {
    el.classList.add('visible');
    chat.scrollTop = chat.scrollHeight;
  });
}

function addAgentReply(text) {
  const chat = document.getElementById('chat-area');
  const wrapper = document.createElement('div');
  wrapper.className = 'agent-turn';
  wrapper.innerHTML = `
    <div class="turn-header">
      <div class="agent-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      </div>
      <div class="turn-meta">
        <span class="turn-agent-name">Insphere Agent</span>
        <span class="turn-label">Answer</span>
      </div>
    </div>
    <div class="bubble typing-cursor" id="reply-bubble-${Date.now()}"></div>
  `;
  chat.appendChild(wrapper);
  requestAnimationFrame(() => {
    wrapper.classList.add('visible');
    chat.scrollTop = chat.scrollHeight;
  });
  const bubble = wrapper.querySelector('.bubble');
  typeText(bubble, text, null);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════════════════════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});
</script>
</body>
</html>
